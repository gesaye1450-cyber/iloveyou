<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mastana AI - Intelligent Chat</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Roboto, sans-serif; }
        body { background-color: #000; color: white; height: 100vh; display: flex; flex-direction: column; }

        /* Header */
        header { padding: 15px; background: #111; border-bottom: 1px solid #333; text-align: center; position: sticky; top: 0; z-index: 10; }
        header h2 { font-size: 20px; color: #0084ff; }

        /* Chat Area */
        #chat-window { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; padding-bottom: 80px; }

        /* Messages */
        .msg { max-width: 85%; padding: 12px 16px; border-radius: 18px; font-size: 16px; line-height: 1.5; word-wrap: break-word; }
        .user-msg { align-self: flex-end; background: #0084ff; color: white; border-bottom-right-radius: 2px; }
        .ai-msg { align-self: flex-start; background: #262626; color: #efefef; border-bottom-left-radius: 2px; border: 1px solid #333; }

        /* Loading Dots */
        .typing { display: none; align-self: flex-start; background: #262626; padding: 10px 15px; border-radius: 15px; font-size: 12px; color: #888; margin-left: 20px; }

        /* Input Fixed at Bottom */
        .input-box-area { position: fixed; bottom: 0; width: 100%; background: #000; padding: 15px; border-top: 1px solid #222; display: flex; gap: 10px; }
        input { flex: 1; padding: 12px 18px; border-radius: 25px; border: 1px solid #444; background: #1a1a1a; color: white; outline: none; font-size: 16px; }
        input:focus { border-color: #0084ff; }
        
        button { background: #0084ff; color: white; border: none; padding: 0 20px; border-radius: 25px; font-weight: bold; cursor: pointer; transition: 0.2s; }
        button:active { transform: scale(0.95); opacity: 0.8; }

        /* Scrollbar Style */
        #chat-window::-webkit-scrollbar { width: 5px; }
        #chat-window::-webkit-scrollbar-thumb { background: #333; border-radius: 10px; }
    </style>
</head>
<body>

    <header>
        <h2>MASTANA AI 🤖</h2>
    </header>

    <div id="chat-window">
        <div class="msg ai-msg">Namaste Ravi! Main Sunny Kumar ka smart AI hoon. Aap mujhse koi bhi sawal pooch sakte hain.</div>
    </div>

    <div class="typing" id="loader">Mastana AI soch raha hai...</div>

    <div class="input-box-area">
        <input type="text" id="userInput" placeholder="Yahan likhiye..." autocomplete="off">
        <button id="sendBtn">Bhejein</button>
    </div>

    <script>
        // --- APKI REAL API KEY ---
        const API_KEY = "AIzaSyAZ5EblFaYrJrtUFWTCoDb5YEXNDXI4Qc4";
        const API_URL = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`;

        const chatWindow = document.getElementById('chat-window');
        const userInput = document.getElementById('userInput');
        const sendBtn = document.getElementById('sendBtn');
        const loader = document.getElementById('loader');

        async function handleChat() {
            const message = userInput.value.trim();
            if (!message) return;

            // 1. User Message Add Karein
            appendMessage(message, 'user-msg');
            userInput.value = "";
            loader.style.display = "block";
            scrollToBottom();

            // 2. Gemini AI se answer maangein
            try {
                const response = await fetch(API_URL, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: message }] }]
                    })
                });

                const data = await response.json();
                const aiText = data.candidates[0].content.parts[0].text;

                // 3. AI Jawab Add Karein
                loader.style.display = "none";
                appendMessage(aiText, 'ai-msg');
                scrollToBottom();

            } catch (error) {
                loader.style.display = "none";
                appendMessage("Maaf kijiyega, server connect nahi ho pa raha. Kripya thodi der baad try karein.", 'ai-msg');
                console.error(error);
            }
        }

        function appendMessage(text, type) {
            const msgDiv = document.createElement('div');
            msgDiv.className = `msg ${type}`;
            // Markdown basic formatting (like bold) handling
            msgDiv.innerText = text; 
            chatWindow.appendChild(msgDiv);
        }

        function scrollToBottom() {
            chatWindow.scrollTop = chatWindow.scrollHeight;
        }

        // Click event
        sendBtn.addEventListener('click', handleChat);

        // Enter key event
        userInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                handleChat();
            }
        });
    </script>
</body>
</html>
