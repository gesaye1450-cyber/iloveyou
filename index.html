<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Magic Surprise ❤️</title>
    <style>
        body {
            margin: 0; height: 100vh; display: flex;
            justify-content: center; align-items: center;
            background: #000; overflow: hidden;
            font-family: 'Arial', sans-serif;
        }

        /* Clicking Area */
        #container { position: relative; cursor: pointer; text-align: center; }

        /* The Big Floating Heart */
        .main-heart {
            font-size: 100px; color: #ff4d6d;
            animation: float 3s ease-in-out infinite, glow 1.5s ease-in-out infinite alternate;
            transition: transform 0.5s;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0) scale(1); }
            50% { transform: translateY(-30px) scale(1.1); }
        }

        @keyframes glow {
            from { text-shadow: 0 0 10px #ff4d6d, 0 0 20px #ff4d6d; }
            to { text-shadow: 0 0 30px #ff758f, 0 0 50px #ff758f; }
        }

        /* Hidden Message */
        #message {
            display: none; position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%); width: 300px;
            color: #fff; z-index: 10;
        }

        h2 { font-size: 2.5rem; color: #ff4d6d; margin: 0; text-shadow: 0 0 10px #fff; }
        p { font-size: 1.2rem; color: #ffccd5; }

        /* Particle Hearts after Blast */
        .particle {
            position: absolute; pointer-events: none;
            font-size: 20px; animation: move var(--d) ease-out forwards;
        }

        @keyframes move {
            to { transform: translate(var(--x), var(--y)); opacity: 0; }
        }

        .hint { color: #555; position: absolute; bottom: -60px; width: 100%; left: 0; }
    </style>
</head>
<body>

    <div id="container" onclick="blast(this)">
        <div class="main-heart" id="heart">❤️</div>
        <div class="hint">Tap to Open</div>
        
        <div id="message">
            <h2>I Love You</h2>
            <p>Aap meri life ki sabse Pahli Ladki Ho!</p>
        </div>
    </div>

    <script>
        function blast(el) {
            const heart = document.getElementById('heart');
            const msg = document.getElementById('message');
            
            // Hide main heart
            heart.style.display = 'none';
            document.querySelector('.hint').style.display = 'none';
            
            // Show message with zoom effect
            msg.style.display = 'block';
            msg.style.animation = 'zoomIn 1s forwards';

            // Create 50 small flying hearts
            for (let i = 0; i < 50; i++) {
                const p = document.createElement('div');
                p.classList.add('particle');
                p.innerHTML = ['❤️', '💖', '✨'][Math.floor(Math.random() * 3)];
                
                // Random directions
                const x = (Math.random() - 0.5) * 400 + 'px';
                const y = (Math.random() - 0.5) * 400 + 'px';
                const d = (Math.random() * 2 + 1) + 's';
                
                p.style.setProperty('--x', x);
                p.style.setProperty('--y', y);
                p.style.setProperty('--d', d);
                p.style.left = '50%';
                p.style.top = '50%';
                
                document.body.appendChild(p);
                setTimeout(() => p.remove(), 2000);
            }
        }
    </script>
</body>
</html>
