<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Surprise Letter ❤️</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@600&family=Poppins:wght@400&display=swap" rel="stylesheet">
    <style>
        body {
            display: flex; justify-content: center; align-items: center;
            height: 100vh; background-color: #fae1dd;
            margin: 0; font-family: 'Poppins', sans-serif; overflow: hidden;
        }

        .envelope-wrapper { background-color: #f7abb1; width: 280px; height: 180px; position: relative; cursor: pointer; border-radius: 0 0 10px 10px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        
        /* Lifafa ka upar wala dhakkan */
        .envelope-wrapper::before {
            content: ""; position: absolute; top: 0; z-index: 2;
            border-top: 100px solid #ff8fa3; border-left: 140px solid transparent; border-right: 140px solid transparent;
            transform-origin: top; transition: transform 0.5s ease;
        }

        /* Khulne wala animation */
        .open::before { transform: rotateX(180deg); z-index: 0; }

        .letter {
            position: absolute; bottom: 0; left: 10px; right: 10px; height: 90%;
            background-color: white; border-radius: 5px; padding: 15px;
            transition: transform 0.5s ease; z-index: 1; text-align: center;
        }

        .open .letter { transform: translateY(-100px); height: 220px; box-shadow: 0 -10px 20px rgba(0,0,0,0.05); }

        .text { font-family: 'Dancing Script', cursive; font-size: 1.3rem; color: #ff4d6d; opacity: 0; }
        .open .text { opacity: 1; transition: opacity 1s 0.5s; }

        .heart-icon { position: absolute; top: 40px; left: 50%; transform: translateX(-50%); font-size: 30px; z-index: 3; color: white; transition: 0.3s; }
        .open .heart-icon { opacity: 0; }

        /* Floating Bubbles */
        .bubble { position: absolute; bottom: -20px; background: rgba(255, 143, 163, 0.3); border-radius: 50%; animation: rise 4s infinite; }
        @keyframes rise { to { transform: translateY(-110vh); opacity: 0; } }
    </style>
</head>
<body>

    <div class="envelope-wrapper" id="envelope" onclick="openLetter()">
        <div class="heart-icon">❤️</div>
        <div class="letter">
            <div class="text">
                Meri Pyari Aditee... <br><br>
                Aap meri muskurahat ki wajah ho. Hamesha aise hi saath rehna! ✨
            </div>
        </div>
    </div>

    <script>
        function openLetter() {
            document.getElementById('envelope').classList.toggle('open');
            createBubbles();
        }

        function createBubbles() {
            for(let i=0; i<15; i++) {
                let b = document.createElement('div');
                b.className = 'bubble';
                let size = Math.random() * 20 + 10 + 'px';
                b.style.width = size; b.style.height = size;
                b.style.left = Math.random() * 100 + 'vw';
                b.style.animationDelay = Math.random() * 2 + 's';
                document.body.appendChild(b);
                setTimeout(() => b.remove(), 4000);
            }
        }
    </script>
</body>
</html>
