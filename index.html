<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sirf Tumhare Liye ❤️</title>
    <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@700&family=Poppins:wght@600&display=swap" rel="stylesheet">
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #fff5f7; /* Halka pinkish background */
            font-family: 'Poppins', sans-serif;
            overflow: hidden;
        }

        /* --- STAGE 1: GIFT BUTTON STYLES --- */
        #gift-box {
            text-align: center;
            cursor: pointer;
            transition: all 0.5s ease;
            z-index: 10;
        }

        .gift-icon {
            font-size: 100px;
            animation: giftBounce 2s infinite;
            filter: drop-shadow(0 5px 10px rgba(0,0,0,0.1));
        }

        @keyframes giftBounce {
            0%, 20%, 50%, 80%, 100% {transform: translateY(0) rotate(0deg);}
            40% {transform: translateY(-30px) rotate(-5deg);}
            60% {transform: translateY(-15px) rotate(5deg);}
        }

        button {
            background: linear-gradient(45deg, #ff4d6d, #ff758f);
            color: white;
            border: none;
            padding: 15px 35px;
            font-size: 1.3rem;
            border-radius: 50px;
            cursor: pointer;
            font-weight: bold;
            box-shadow: 0 8px 20px rgba(255, 77, 109, 0.4);
            transition: all 0.3s ease;
            margin-top: 20px;
        }

        button:hover {
            transform: scale(1.1);
            box-shadow: 0 10px 25px rgba(255, 77, 109, 0.6);
        }

        /* --- STAGE 2: LOVE ANIMATION STYLES (Initially Hidden) --- */
        #love-screen {
            display: none; /* Hidden */
            text-align: center;
            flex-direction: column;
            z-index: 5;
        }

        /* Fancy animated text style */
        .fancy-text {
            font-family: 'Caveat', cursive; /* Handwritten styke font */
            font-size: 5rem;
            color: #ff4d6d;
            margin: 0;
            display: flex;
            justify-content: center;
            gap: 10px; /* space between letters */
        }

        /* Base style for each letter before animation */
        .fancy-text span {
            display: inline-block;
            opacity: 0;
            transform: translateY(100px) rotate(50deg) scale(0);
            animation: letterEntry 1s ease-out forwards;
            text-shadow: 0 0 10px rgba(255, 77, 109, 0.3);
        }

        /* Letter entering animation */
        @keyframes letterEntry {
            to {
                opacity: 1;
                transform: translateY(0) rotate(0deg) scale(1);
            }
        }

        /* Glowing effect after text is formed */
        .glow-effect {
            animation: textGlow 2s ease-in-out infinite alternate;
        }

        @keyframes textGlow {
            from {
                text-shadow: 0 0 10px #fff, 0 0 20px #fff, 0 0 30px #ff4d6d, 0 0 40px #ff4d6d;
            }
            to {
                text-shadow: 0 0 5px #fff, 0 0 10px #fff, 0 0 15px #ff4d6d, 0 0 20px #ff4d6d;
            }
        }

        .shiny-text {
            color: #c9184a;
            font-size: 1.6rem;
            font-weight: 500;
            margin-top: 10px;
            opacity: 0;
            animation: fadeIn 1s ease 2s forwards; /* Fades in after main text */
        }

        @keyframes fadeIn {
            to { opacity: 1; }
        }

        /* --- FLOATING HEARTS STYLES --- */
        .heart {
            position: absolute;
            color: #ff758f;
            animation: fly linear infinite;
            pointer-events: none;
            z-index: 1;
        }

        @keyframes fly {
            0% { transform: translateY(0) rotate(0deg); opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { transform: translateY(-110vh) rotate(360deg); opacity: 0; }
        }
    </style>
</head>
<body>

    <div id="gift-box">
        <div class="gift-icon">🎁</div>
        <button onclick="revealLove()">Aapke Liye Kuch Hai...</button>
    </div>

    <div id="love-screen">
        <h1 class="fancy-text" id="love-text">
            <span>I</span>
            <span>&nbsp;</span> <span>L</span>
            <span>o</span>
            <span>v</span>
            <span>e</span>
            <span>&nbsp;</span>
            <span>Y</span>
            <span>o</span>
            <span>u</span>
            <span>❤️</span>
        </h1>
        
    </div>

    <script>
        function revealLove() {
            // 1. Hide the gift button smoothly
            const giftBox = document.getElementById('gift-box');
            giftBox.style.opacity = '0';
            giftBox.style.transform = 'scale(0.5)';
            
            setTimeout(() => {
                giftBox.style.display = 'none';
                
                // 2. Show the love screen
                const loveScreen = document.getElementById('love-screen');
                loveScreen.style.display = 'flex';
                
                // 3. Set a delay for each letter's animation
                const letters = document.querySelectorAll('.fancy-text span');
                letters.forEach((letter, index) => {
                    letter.style.animationDelay = (index * 0.15) + 's'; // staggered entry
                });

                // 4. Add glowing effect after all letters arrive (approx 2s)
                setTimeout(() => {
                    document.getElementById('love-text').classList.add('glow-effect');
                }, letters.length * 150 + 1000);

                // 5. Start the heart shower
                setInterval(createHeart, 100); // intense heart shower
                
            }, 500); // delay after button click
        }

        function createHeart() {
            const heart = document.createElement('div');
            heart.classList.add('heart');
            
            const icons = ['❤️', '💖', '✨', '🌸', '💘'];
            heart.innerHTML = icons[Math.floor(Math.random() * icons.length)];
            
            heart.style.left = Math.random() * 100 + 'vw';
            heart.style.bottom = '-10vh'; // starts from below screen
            heart.style.fontSize = (Math.random() * 20 + 20) + 'px'; // random size
            heart.style.animationDuration = (Math.random() * 3 + 2) + 's'; // random speed
            
            document.body.appendChild(heart);
            
            // remove to clean memory
            setTimeout(() => {
                heart.remove();
            }, 5000);
        }
    </script>
</body>
</html>
