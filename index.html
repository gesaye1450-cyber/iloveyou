<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sirf Tumhare Liye ❤️</title>
    <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@700&family=Poppins:wght@600&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; }
        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            display: flex; justify-content: center; align-items: center;
            background: #fff5f7;
            font-family: 'Poppins', sans-serif;
            overflow: hidden;
        }

        /* --- STAGE 1: GIFT BOX (Mobile Friendly) --- */
        #gift-box {
            text-align: center;
            padding: 20px;
            width: 100%;
            max-width: 400px;
            z-index: 10;
        }

        .gift-icon {
            font-size: 70px; /* Thoda chota mobile ke liye */
            animation: giftBounce 2s infinite;
        }

        @keyframes giftBounce {
            0%, 20%, 50%, 80%, 100% {transform: translateY(0);}
            40% {transform: translateY(-20px);}
            60% {transform: translateY(-10px);}
        }

        button {
            background: linear-gradient(45deg, #ff4d6d, #ff758f);
            color: white; border: none;
            padding: 12px 30px;
            font-size: 1.1rem;
            border-radius: 50px;
            cursor: pointer;
            font-weight: bold;
            box-shadow: 0 5px 15px rgba(255, 77, 109, 0.4);
            margin-top: 15px;
            width: 80%; /* Mobile par button bada dikhega */
        }

        /* --- STAGE 2: LOVE SCREEN (Responsive) --- */
        #love-screen {
            display: none;
            text-align: center;
            flex-direction: column;
            width: 100%;
            padding: 10px;
        }

        .fancy-text {
            font-family: 'Caveat', cursive;
            font-size: 3.5rem; /* Mobile ke liye perfect size */
            color: #ff4d6d;
            margin: 0;
            display: flex;
            justify-content: center;
            flex-wrap: wrap; /* Text mobile par wrap ho jayega */
            gap: 5px;
        }

        /* Letter Entry Animation */
        .fancy-text span {
            display: inline-block;
            opacity: 0;
            transform: translateY(50px) scale(0);
            animation: letterEntry 0.8s ease-out forwards;
        }

        @keyframes letterEntry {
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        .shiny-text {
            color: #c9184a;
            font-size: 1.2rem;
            margin-top: 15px;
            opacity: 0;
            animation: fadeIn 1s ease 2s forwards;
            padding: 0 20px;
        }

        @keyframes fadeIn { to { opacity: 1; } }

        /* Floating Hearts */
        .heart {
            position: absolute;
            animation: fly linear infinite;
            pointer-events: none;
            z-index: 1;
        }

        @keyframes fly {
            0% { transform: translateY(0); opacity: 0; }
            10% { opacity: 1; }
            100% { transform: translateY(-110vh) rotate(360deg); opacity: 0; }
        }

        /* Screen choti ho toh text size adjust karein */
        @media (max-width: 480px) {
            .fancy-text { font-size: 2.8rem; }
            .shiny-text { font-size: 1.1rem; }
        }
    </style>
</head>
<body>

    <div id="gift-box">
        <div class="gift-icon">🎁</div>
        <button onclick="revealLove()">Aapke Liye Kuch Hai...</button>
    </div>

    <div id="love-screen">
        <h1 class="fancy-text" id="love-text">
            <span>I</span><span>&nbsp;</span><span>L</span><span>o</span><span>v</span><span>e</span><span>&nbsp;</span><span>Y</span><span>o</span><span>u</span><span>❤️</span>
        </h1>
        <p class="shiny-text">Aap mere liye sabse special ho!</p>
    </div>

    <script>
        function revealLove() {
            document.getElementById('gift-box').style.display = 'none';
            const loveScreen = document.getElementById('love-screen');
            loveScreen.style.display = 'flex';
            
            const letters = document.querySelectorAll('.fancy-text span');
            letters.forEach((l, i) => { l.style.animationDelay = (i * 0.1) + 's'; });

            setInterval(createHeart, 200);
        }

        function createHeart() {
            const heart = document.createElement('div');
            heart.classList.add('heart');
            heart.innerHTML = ['❤️','💖','🌸','✨'][Math.floor(Math.random()*4)];
            heart.style.left = Math.random() * 100 + 'vw';
            heart.style.bottom = '-5vh';
            heart.style.fontSize = (Math.random() * 15 + 15) + 'px';
            heart.style.animationDuration = (Math.random() * 2 + 3) + 's';
            document.body.appendChild(heart);
            setTimeout(() => heart.remove(), 4000);
        }
    </script>
</body>
</html>
